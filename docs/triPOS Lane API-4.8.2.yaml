      description: "Use this endpoint to see the most recent connection status for a specific lane. TriPOS Cloud uses heartbeats and device activity to determine PIN pad connection state. External calls to the ConnectionStatus endpoint retrieve the most recent of those states. This endpoint does not connect to the PIN pad in real-time and any updates to the status of the PIN pad may take up to 75 seconds to be reflected in the status returned by the endpoint.\r\n            <br></br>May be used as a regular-interval health status check. <b>Max Interval</b>: Every <b>2</b> minutes. If used with another API endpoint that is suitable for a regular-interval health check, max frequency should reflect all such calls as a group."
