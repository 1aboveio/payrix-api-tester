  '/v1/lanes/{laneId}/command':
    post:
      consumes:
        - application/json
        - text/json
        - application/x-www-form-urlencoded
      produces:
        - application/json
        - text/json
      parameters:
        - description: The lane ID.
          format: int32
          in: path
          name: laneId
          required: true
          type: integer
        - description: >-
            Command includes three options: <br />• ‘reinitialize’, reloads any
            required device configurations using the existing values in the lane
            configuration database.<br />• ‘multiaid’, to configure the AID
            prompts on PIN pad device. Value of deviceConfiguration parameter
            should be set to ‘isDisplayCustomAidScreen’.<br />• ‘reboottime’, to
            set the reboot time (in UTC 00:00:00 format) of PCIv4 PIN pads.
            Value of deviceConfiguration parameter should be set to
            ‘reboottime’.
          in: query
          name: cmd
          required: true
          type: string
        - description: 'Set the device reboot time, Custom form for Aid Selection'
          in: body
          name: deviceConfiguration
          required: true
          schema:
            $ref: '#/definitions/DeviceConfigurationRequest'
        - description: The ID of the business application.
