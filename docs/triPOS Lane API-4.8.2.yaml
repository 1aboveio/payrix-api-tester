        $ref: '#/definitions/CashbackManualEntryRequest'
        description: >-
          Configurable settings for allowing a cashback choice through manual
          entry.
      selectionAmounts:
        description: >-
          The cashback amounts to display on the PIN pad's selection buttons
          (i.e. 5,10,20,50).
        type: string
    type: object
  ConnectionStatusDto:
    properties:
