        type: number
      tipSelections:
        type: string
      userInputTimeout:
        format: int32
        type: integer
    type: object
  LaneConfigurationRequest:
    properties:
      allowDebit:
        description: Use this parameter to allow debit.
        type: boolean
      allowEMVContactlessPINBypass:
        description: >-
          gets or sets the allowing EMV Contactless PIN Bypass, false by
          default.
        type: boolean
      allowPartialApprovals:
        description: 'If set to true, partial approvals are allowed.'
        type: boolean
      cashbackOptions:
        $ref: '#/definitions/CashbackOptionsRequest'
        description: Use this section to specify cashback options.
      checkForDuplicateTransactions:
        description: 'If set to true, enables duplicate checking for all transactions.'
        type: boolean
      confirmConvenienceFeeAmount:
        description: >-
          Set to true to prompt the cardholder to confirm the
          convenienceFeeAmount on the PIN pad.
        type: boolean
      confirmOriginalAmount:
        description: >-
          If set to true, the original transaction amount will be confirmed
          after card information is obtained.
        type: boolean
      contactlessEmvEnabled:
        description: >-
          A Boolean value (true|false) that enables Contactless EMV, if
          supported.
        type: string
      contactlessEventDelayTime:
        description: >-
          gets or sets the device contactless card detection time in seconds.
          Can be 0 or higher, which is 1 by default.
        format: double
        type: number
      contactlessMsdEnabled:
        description: >-
          A Boolean value (true|false) that enables Contactless MSD, if
          supported.
        type: string
      countryCode:
        description: >-
          The country code where triPOS is being used. Valid values are 'Usa'
          and 'Can'.
        type: string
      creditAvsEntryCondition:
        description: >-
          Set when AVS entry (billing postal code entry) should be prompted for
          credit transactions: 'Always', 'Never' or 'Keyed'.'Keyed' indicates
          that cards that are manually keyed in should be prompted for AVS.
        type: string
      currencyCode:
        description: >-
          The currency code that will be used for all transactions. Values can
          be USD for United States dollar or None. If value set to None then the
          currencyCode value should be set to USD through the API.
        type: string
      displayTotalsSummaryTimer:
        description: 'gets or sets the display text screen timer, false by default.'
        type: string
      emvFallbackAllowed:
        description: >-
          This value determines the system's behavior for allowing swipe
          fallback for a chip card. Values can be 'NeverAllow' or
          'AllowAfterChipError'.
        type: string
      isAmexDebitAllowed:
        description: >-
          gets or sets the Amex Debit transaction allowed or not, false by
          default.
        type: boolean
      isCSCSupported:
        description: >-
          Invokes prompt for cardholder to enter card security code for manual
          keyed card entry.
        type: string
      isCashbackAllowed:
        description: Set to true to allow cashback.
        type: boolean
      isConfirmCreditSurchargeScreenDisplayed:
        description: >-
          A Boolean value (true|false) that enables the confirm credit surcharge
          screen. false by default.
        type: boolean
      isConfirmTotalAmountScreenDisplayed:
        description: >-
          A Boolean value (true|false) that enables the confirm total amount
          screen. True by default.
        type: boolean
      isConvenienceFeeToBeDisplayed:
        description: 'gets or sets tthe displaying the convenience fee, false by default.'
        type: boolean
      isDebitRefundSupported:
        description: >-
          Set to true to allow refunds onto a debit card. Not all processors
          support this.
        type: boolean
      isDisplayCustomAidScreen:
        description: Turn On/Off Custom Multi Aid Screen.
        type: boolean
      isDynamicCurrencyConversionEnabled:
        description: >-
          A Boolean value (true|false) that enables the dynamic currency screen.
          False by default.
        type: boolean
      isEbtCashBenefitSupported:
        description: Set to true to allow Ebt Cash benefit cards to be used.
        type: boolean
      isEbtFoodStampSupported:
        description: Set to true to allow Ebt Food stamp cards to be used.
        type: boolean
      isEbtRefundSupported:
        description: >-
          Set to true to allow refunds onto a EBT card. Not all processors
          support this.
        type: boolean
      isEmvSupported:
        description: >-
          Set to true to enable your application to accept EMV transactions. Set
          to false to not allow EMV transactions.
        type: boolean
      isFleetSupported:
        description: >-
          A Boolean value (true|false) that enables the Fleet Card Support.
          False by default.
        type: boolean
      isGiftSupported:
        description: Set to true to allow gift only cards to be used.
        type: string
      isHealthcareSupported:
        description: >-
          This value determines if triPOS will allow healthcare data in sale and
          auth requests for integrators that may be required to implement an
          Inventory Information Approval System (IIAS) for retail point of sale
          systems.
        type: boolean
      isHostedSurchargeEnabled:
        description: >-
          gets or sets the Hosted Credit Surcharge allowed or not, false by
          default.
        type: boolean
      isManualEntryAllowed:
        type: string
      isPostResponseCleanupEnabled:
        description: >-
          gets or sets the flag that indicates whether a transaction should
          return the response ASAP, false by default.
        type: boolean
      isSurchargeAmountToBeDisplayed:
        description: 'gets or sets the displaying the Surcharge Amount, false by default.'
        type: boolean
      isTipAllowed:
        description: Set to true to allow tips to be added.
        type: boolean
      isTipPromptAllowed:
        description: >-
          A Boolean value (true|false) that enable Leave a tip? confirmation
          prompt before tip selection.
        type: boolean
      isTotalAmountToBeDisplayed:
        description: 'gets or sets the displaying the total Amount, false by default.'
        type: boolean
      laneLockingEnabled:
        type: boolean
      language:
        description: >-
          The language to set default language triPOS should use. Valid values
          are 'English' and 'French'.
        type: string
      marketCode:
        description: >-
          The market code specific to the type of transaction being submitted.
          Values: Default, AutoRental, DirectMarketing, ECommerce,
          FoodRestaurant, HotelLodging, Petroleum, Retail, QSR.
        type: string
      pinPadType:
        type: string
      preferredAid:
        description: >-
          Preferred AID Selection. Values can be 0, 1 or 2. 0 = Prefer the
          highest priority AID on card, 1 = Prefer US Common Debit, 2 = Prefer
          Global Debit
        type: string
      processMaestroDebitAidWithOffLinePinCvmAsDebit:
        description: >-
          Use this parameter to allow Maestro Debit Aids to be processed as
          Debit if the CVM is Offline PIN.
        type: string
      processor:
        description: Name of the Processor.
        type: string
      promptToRemoveCardAtTransactionStart:
        description: >-
          gets or sets the prompt to remove the card if it is inserted at the
          beginning of a transaction, true by default.
        type: boolean
      provisionalAmount:
        description: >-
          Override provisional amount used for QC transactions, which is $1.00
          by default.
        type: string
      quickChipDataLifetime:
        description: >-
          A positive integer between 30 and 600 indicating the number of seconds
          the pre-read. Data will be stored for the Quick-Chip feature, if
          supported and enabled.
        type: string
      quickChipEnabled:
        description: >-
          A Boolean value (true|false) that enables Quick-Chip feature, if
          supported.
        type: string
      rebootTime:
        description: 'Device reboot time in 24 hour format HH:MM or HHMM.'
        type: string
      signatureFormat:
        description: >-
          The format which signature data should come back as.
          PointsLittleEndian, PointsBigEndian, Ascii3Byte.
        type: string
      thresholdAmount:
        description: >-
          Specifies the threshold value to use when promptForSignature is
          UseThreshold. Leave as 0 or empty to always require a signature for
          credit sale, otherwise set to the amount that must be reached before
          asking for a signature, such as 25.00.
        format: double
        type: number
      tipSelections:
        description: CSV tip amount selections.
        type: string
      userInputTimeout:
        description: >-
          Custom User Input Timeout for prompt screens.Ex: For 30 seconds is
          30000 milliseconds.
        type: string
    type: object
  LaneDto:
    properties:
      _links:
        items:
          $ref: '#/definitions/LinkDto'
        type: array
      applicationVersion1:
        type: string
      applicationVersion2:
        type: string
      certificateThumbprint:
        type: string
      connectionStatus:
        $ref: '#/definitions/ConnectionStatusDto'
      contactlessEmvEnabled:
        description: 'A {System.Boolean} value indicating if Contactless EMV is enabled.'
        type: boolean
      contactlessMsdEnabled:
        description: 'A {System.Boolean} value indicating if Contactless MSD is enabled.'
        type: boolean
      countryCode:
        type: string
      description:
        type: string
      emvKernelVersion:
        type: string
      laneId:
        format: int32
        type: integer
      language:
        type: string
      modelNumber:
        type: string
      operatingSystemVersion:
        type: string
      processor:
        type: string
      profile:
        $ref: '#/definitions/ProfileDto'
      quickChipDataLifetime:
        description: >-
          A positive integer between 30 and 600 indicating the maximum lifetime
          of pre-read data before expiration.
        format: int32
        type: integer
      quickChipEnabled:
        description: >-
          A {System.Boolean} value indicating if the Quick Chip feature is
          enabled.
        type: boolean
      rawDeviceInformation:
        type: string
      securityVersion:
        type: string
      serialNumber:
        type: string
      terminalId:
        type: string
    type: object
  LaneRequest:
    properties:
      activationCode:
