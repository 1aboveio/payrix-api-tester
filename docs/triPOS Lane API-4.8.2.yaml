      description: "Use this endpoint to add a new lane to your account. An activation code should be displayed on the PIN pad you are trying to associate.\r\nThe intention is that the end user initiates the pairing by taking the activation code and entering it into the point of sale application.\r\n<a href=\"https://triposcert.vantiv.com/api/help/kb/cloud/LaneRequest-Post.html\">more»</a>"
