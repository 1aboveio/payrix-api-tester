name: E2E Smoke (localhost)

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]

jobs:
  e2e-smoke:
    name: Run E2E smoke against localhost
    runs-on: ubuntu-latest
    if: '!github.event.pull_request.draft'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build app
        run: npm run build

      - name: Start app
        run: npm run start -- --hostname 127.0.0.1 --port 3000 &

      - name: Wait for app
        run: npx wait-on http://127.0.0.1:3000

      - name: Run smoke tests
        run: npx playwright test e2e/smoke.spec.ts --project=chromium --reporter=line
        env:
          E2E_BASE_URL: http://127.0.0.1:3000

      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-smoke-test-results
          path: |
            playwright-report/
            test-results/
          retention-days: 7
