name: Strip status labels on issue close

on:
  issues:
    types: [closed]

jobs:
  strip-labels:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Remove status labels
        uses: actions/github-script@v7
        with:
          script: |
            const labels = context.payload.issue.labels.map(l => l.name);
            const statusLabels = labels.filter(l => l.startsWith('status:'));
            if (statusLabels.length === 0) {
              console.log('No status labels to remove.');
              return;
            }
            for (const label of statusLabels) {
              try {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.payload.issue.number,
                  name: label,
                });
                console.log(`Removed label: ${label}`);
              } catch (e) {
                console.log(`Could not remove label ${label}: ${e.message}`);
              }
            }
