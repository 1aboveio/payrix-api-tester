name: Auto PR Review

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  request-reviews:
    runs-on: ubuntu-latest
    if: ${{ !github.event.pull_request.draft }}
    steps:
      - name: Request reviewers (idempotent)
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const author = pr.user.login;
            const desired = ['alo335', 'vera932'].filter(r => r !== author);

            if (desired.length === 0) return;

            const { data: reviews } = await github.rest.pulls.listRequestedReviewers({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
            });
            const alreadyRequested = new Set(reviews.users.map(u => u.login));
            const toRequest = desired.filter(r => !alreadyRequested.has(r));

            if (toRequest.length > 0) {
              await github.rest.pulls.requestReviewers({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
                reviewers: toRequest,
              });
              console.log(`Requested reviews from: ${toRequest.join(', ')}`);
            } else {
              console.log('All reviewers already requested, skipping.');
            }

  codex-review:
    runs-on: ubuntu-latest
    if: >-
      !github.event.pull_request.draft &&
      contains(fromJson('["opened","reopened","synchronize","ready_for_review"]'), github.event.action)
    steps:
      - name: Trigger Codex review (deduplicated)
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.CODEX_TRIGGER_PAT || github.token }}
          script: |
            const token = '${{ secrets.CODEX_TRIGGER_PAT }}';
            if (!token) {
              console.log('CODEX_TRIGGER_PAT not configured, skipping Codex review trigger.');
              return;
            }

            const prNumber = context.payload.pull_request.number;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              per_page: 10,
              direction: 'desc',
            });

            const recentCodexComment = comments.find(c =>
              c.body.trim() === '@codex review' &&
              Date.now() - new Date(c.created_at).getTime() < 300_000
            );

            if (recentCodexComment) {
              console.log('Recent @codex review comment found, skipping duplicate.');
              return;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: '@codex review',
            });
            console.log('Triggered Codex review via comment');
