name: payrix-api-tester E2E (post-deploy)

on:
  repository_dispatch:
    types:
      - deploy-success

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      E2E_BASE_URL: ${{ github.event.client_payload.service_url }}
      BASE_URL: ${{ github.event.client_payload.service_url }}
      CI: true
      TEST_PLATFORM_API_KEY: ${{ secrets.TEST_PLATFORM_API_KEY }}
      # Explicitly write JSON results to workspace root
      PLAYWRIGHT_JSON_OUTPUT_NAME: playwright-results.json
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.client_payload.commit || 'main' }}

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps

      - name: Run Playwright E2E tests
        id: run_tests
        # line reporter → human-readable logs; json reporter → results file
        # PLAYWRIGHT_JSON_OUTPUT_NAME tells json reporter where to write
        run: pnpm exec playwright test --workers=4 --reporter=line,json
        continue-on-error: true

      - name: Generate job summary
        if: always()
        run: |
          COMMIT="${{ github.event.client_payload.commit }}"
          SHORT="${COMMIT:0:7}"
          ENV="${{ github.event.client_payload.env }}"
          URL="${{ github.event.client_payload.service_url }}"
          RESULTS_FILE="${GITHUB_WORKSPACE}/playwright-results.json"

          {
            echo "## E2E — \`${ENV}\` @ \`${SHORT}\`"
            echo ""
            echo "**Service:** ${URL}"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

          if [ -f "$RESULTS_FILE" ]; then
            python3 - "$RESULTS_FILE" <<'PYEOF'
import json, os, sys

with open(sys.argv[1]) as f:
    data = json.load(f)

stats = data.get("stats", {})
passed  = stats.get("expected", 0)
failed  = stats.get("unexpected", 0)
flaky   = stats.get("flaky", 0)
skipped = stats.get("skipped", 0)
total   = stats.get("total", passed + failed + flaky + skipped)

out_path = os.environ["GITHUB_STEP_SUMMARY"]
with open(out_path, "a") as out:
    icon = "✅" if failed == 0 else "❌"
    flaky_str = f" ({flaky} flaky)" if flaky else ""
    out.write(f"### {icon} {passed}/{total} tests passed{flaky_str}\n\n")

    if failed > 0:
        out.write("#### Failed Tests\n\n")

        failures = []

        def collect(suite, prefix=""):
            title = suite.get("title", "")
            for spec in suite.get("specs", []):
                name = (prefix + " > " + spec["title"]).strip(" > ")
                for test in spec.get("tests", []):
                    if test.get("status") not in ("expected", "skipped"):
                        err = ""
                        for r in test.get("results", []):
                            for e in r.get("errors", []):
                                msg = e.get("message") or e.get("value") or ""
                                if msg:
                                    err = msg[:400]
                                    break
                            if err:
                                break
                        failures.append({"name": name, "error": err})
            for child in suite.get("suites", []):
                child_prefix = (prefix + " > " + title).strip(" > ") if title else prefix
                collect(child, child_prefix)

        for s in data.get("suites", []):
            collect(s)

        for i, f in enumerate(failures[:3]):
            out.write(f"**{i+1}. `{f['name']}`**\n")
            if f["error"]:
                out.write(f"```\n{f['error']}\n```\n")
            out.write("\n")

        if len(failures) > 3:
            out.write(f"…and {len(failures) - 3} more.\n")
PYEOF
          else
            echo "_(No test results file found — tests may have crashed before producing output)_" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Fail job if tests failed
        if: steps.run_tests.outcome == 'failure'
        run: exit 1

      - name: Upload E2E test artifacts on failure
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-artifacts
          path: |
            test-results/
            playwright-report/
            playwright-results.json
