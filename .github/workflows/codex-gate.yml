name: Codex Gate

# Resolves the codex-review status check when Codex submits its review.
# Two trigger paths:
#   1. pull_request_review — Codex posts inline badge comments when it finds issues
#   2. issue_comment       — Codex posts a plain comment when review is clean

on:
  pull_request_review:
    types: [submitted]
  issue_comment:
    types: [created]

permissions:
  pull-requests: read
  statuses: write

jobs:
  gate-review:
    if: |
      github.event_name == 'pull_request_review' &&
      github.event.review.user.login == 'chatgpt-codex-connector[bot]'
    uses: 1aboveio/.github/.github/workflows/codex-gate.yml@main
    with:
      trigger_type: 'pull_request_review'
      pr_number: ${{ github.event.pull_request.number }}
      commit_sha: ${{ github.event.pull_request.head.sha }}
      review_id: ${{ github.event.review.id }}
    secrets: inherit

  gate-comment:
    if: |
      github.event_name == 'issue_comment' &&
      github.event.issue.pull_request != null &&
      github.event.comment.user.login == 'chatgpt-codex-connector[bot]'
    uses: 1aboveio/.github/.github/workflows/codex-gate.yml@main
    with:
      trigger_type: 'issue_comment'
      pr_number: ${{ github.event.issue.number }}
      is_clean_pass: ${{ contains(github.event.comment.body, 'no issues') || contains(github.event.comment.body, 'looks good') || contains(github.event.comment.body, 'No issues found') || contains(github.event.comment.body, 'LGTM') }}
    secrets: inherit
