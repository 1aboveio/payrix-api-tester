name: Codex Gate

on:
  pull_request_review:
    types: [submitted]
  issue_comment:
    types: [created]

jobs:
  gate-on-review:
    if: >-
      github.event_name == 'pull_request_review' &&
      github.event.review.user.login == 'chatgpt-codex-connector[bot]'
    uses: 1aboveio/.github/.github/workflows/codex-gate.yml@main
    with:
      trigger_type: pull_request_review
      pr_number: ${{ github.event.pull_request.number }}
      commit_sha: ${{ github.event.pull_request.head.sha }}
      review_id: ${{ github.event.review.id }}
    secrets: inherit

  gate-on-comment:
    if: >-
      github.event_name == 'issue_comment' &&
      github.event.issue.pull_request != null &&
      github.event.comment.user.login == 'chatgpt-codex-connector[bot]'
    uses: 1aboveio/.github/.github/workflows/codex-gate.yml@main
    with:
      trigger_type: issue_comment
      pr_number: ${{ github.event.issue.number }}
      is_clean_pass: ${{ contains(github.event.comment.body, 'Didn''t find any major issues.') }}
    secrets: inherit
