name: Codex Auto Review

on:
  pull_request:
    types: [opened, ready_for_review, synchronize]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  codex-review:
    runs-on: ubuntu-latest
    if: ${{ !github.event.pull_request.draft }}
    steps:
      - name: Trigger Codex review
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.CODEX_TRIGGER_PAT || secrets.GITHUB_TOKEN }}
          script: |
            const token = '${{ secrets.CODEX_TRIGGER_PAT }}';
            if (!token) {
              console.log('CODEX_TRIGGER_PAT not configured — skipping Codex review trigger.');
              console.log('Add a PAT with repo scope from the Codex connector owner as CODEX_TRIGGER_PAT secret.');
              return;
            }

            const prNumber = context.payload.pull_request.number;
            const baseBranch = context.payload.pull_request.base.ref;

            // Only trigger review for PRs targeting dev or main.
            // - PR → dev: P0 + P1 only (fast feedback during development)
            // - PR → main: full review, all priorities (prod gate)
            // - any other branch: skip silently
            let body;
            if (baseBranch === 'main') {
              body = '@codex review';
            } else if (baseBranch === 'dev') {
              body = '@codex review\n\nOnly report **P0** (critical: security vulnerabilities, data loss, crashes, broken deployments) and **P1** (significant: bugs, incorrect logic, missing error handling, breaking API changes). Skip P2 and below (style, minor improvements, suggestions).';
            } else {
              console.log(`Target branch is '${baseBranch}' — Codex review only runs for dev and main. Skipping.`);
              return;
            }

            // Deduplicate: skip if an identical review was posted in the last 5 minutes
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              per_page: 10,
              direction: 'desc',
            });

            const recentCodexComment = comments.find(c =>
              c.body.startsWith('@codex review') &&
              Date.now() - new Date(c.created_at).getTime() < 300_000
            );

            if (recentCodexComment) {
              console.log('Recent @codex review comment found — skipping duplicate.');
              return;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body,
            });
            const mode = baseBranch === 'main' ? 'full review' : 'P0+P1 only';
            console.log(`Triggered Codex review on PR #${prNumber} (target: ${baseBranch}, mode: ${mode})`);
