name: Codex Auto Review

# Triggers Codex review on new PRs, re-triggers on new commits (synchronize),
# and re-triggers when a human reviewer submits a review (e.g. requests changes).
#
# Review depth is branch-aware:
#   PR → dev  : P0 + P1 only (security, bugs — fast feedback during development)
#   PR → main : P0 + P1 + P2 (full review — production gate)

on:
  pull_request:
    types: [opened, ready_for_review, synchronize]
  pull_request_review:
    types: [submitted]

permissions:
  pull-requests: write
  issues: write
  statuses: write

jobs:
  codex-review:
    # Skip draft PRs.
    # Skip when Codex itself submits a review — that is handled by codex-gate.yml.
    if: |
      !github.event.pull_request.draft &&
      github.event.review.user.login != 'chatgpt-codex-connector[bot]'
    uses: 1aboveio/.github/.github/workflows/codex.yml@main
    with:
      base_branch: ${{ github.event.pull_request.base.ref || github.base_ref }}
      pr_number: ${{ github.event.pull_request.number }}
      commit_sha: ${{ github.event.pull_request.head.sha }}
    secrets:
      CODEX_TRIGGER_PAT: ${{ secrets.CODEX_TRIGGER_PAT }}
