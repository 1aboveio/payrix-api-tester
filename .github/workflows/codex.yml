name: Codex Auto Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  codex-review:
    runs-on: ubuntu-latest
    if: ${{ !github.event.pull_request.draft }}
    steps:
      - name: Trigger Codex review
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.CODEX_TRIGGER_PAT || secrets.GITHUB_TOKEN }}
          script: |
            const token = '${{ secrets.CODEX_TRIGGER_PAT }}';
            if (!token) {
              console.log('CODEX_TRIGGER_PAT not configured — skipping Codex review trigger.');
              console.log('Add a PAT with repo scope from the Codex connector owner as CODEX_TRIGGER_PAT secret.');
              return;
            }

            const prNumber = context.payload.pull_request.number;

            // Deduplicate: skip if @codex review was posted in the last 5 minutes
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              per_page: 10,
              direction: 'desc',
            });

            const recentCodexComment = comments.find(c =>
              c.body.trim() === '@codex review' &&
              Date.now() - new Date(c.created_at).getTime() < 300_000
            );

            if (recentCodexComment) {
              console.log('Recent @codex review comment found — skipping duplicate.');
              return;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: '@codex review',
            });
            console.log(`Triggered Codex review on PR #${prNumber}`);
