name: Codex Auto Review

# Triggers Codex review on new PRs, re-triggers on new commits (synchronize),
# and re-triggers when a human reviewer submits a review (e.g. requests changes).
#
# Review depth is branch-aware:
#   PR → dev  : P0 + P1 only (security, bugs — fast feedback during development)
#   PR → main : P0 + P1 + P2 (full review — production gate)

on:
  pull_request:
    types: [opened, ready_for_review, synchronize]
  pull_request_review:
    types: [submitted]

permissions:
  contents: read
  pull-requests: write
  issues: write
  statuses: write

jobs:
  codex-review:
    runs-on: ubuntu-latest
    # Skip draft PRs.
    # Skip when Codex itself submits a review — that path is handled by codex-gate.yml.
    if: ${{ github.event_name == 'pull_request' || github.event_name == 'pull_request_review' }} && !github.event.pull_request?.draft && github.actor != 'github-actions[bot]' && github.actor != 'codex-bot' && github.event.review?.user?.login != 'chatgpt-codex-connector[bot]'
    steps:
      # Step 1: Run all pre-checks (PAT present, target branch, dedup).
      # Sets output should_trigger=true only when we will actually post a comment.
      # If skipping for any reason other than dedup, resolves the status immediately.
      # For dedup, does NOT touch the status — preserving the existing check result.
      - name: Pre-check
        id: decide
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const token = '${{ secrets.CODEX_TRIGGER_PAT }}';
            const prNumber = context.payload.pull_request.number;
            const baseBranch = context.payload.pull_request.base.ref;
            const sha = context.payload.pull_request.head.sha;

            if (!token) {
              console.log('CODEX_TRIGGER_PAT not configured — skipping.');
              await github.rest.repos.createCommitStatus({
                owner: context.repo.owner,
                repo: context.repo.repo,
                sha,
                state: 'success',
                context: 'codex-review',
                description: 'Skipped (CODEX_TRIGGER_PAT not configured)',
              });
              core.setOutput('should_trigger', 'false');
              return;
            }

            if (baseBranch !== 'dev' && baseBranch !== 'main') {
              console.log(`Target branch '${baseBranch}' — skipping (not dev/main).`);
              await github.rest.repos.createCommitStatus({
                owner: context.repo.owner,
                repo: context.repo.repo,
                sha,
                state: 'success',
                context: 'codex-review',
                description: 'Skipped (not a dev/main PR)',
              });
              core.setOutput('should_trigger', 'false');
              return;
            }

            // Deduplicate: if a review was triggered in the last 5 minutes, don't
            // overwrite the existing status — the prior Codex run is still valid.
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              per_page: 10,
              direction: 'desc',
            });

            const recentCodexComment = comments.find(c =>
              c.body.startsWith('@codex review') &&
              Date.now() - new Date(c.created_at).getTime() < 300_000
            );

            if (recentCodexComment) {
              console.log('Recent @codex review comment found — dedup skip. Status unchanged.');
              core.setOutput('should_trigger', 'false');
              return;
            }

            core.setOutput('should_trigger', 'true');

      # Step 2: Set pending status — only when we will actually post a comment.
      # Uses GITHUB_TOKEN to avoid issues with fine-grained PATs that lack repo:status.
      - name: Set pending status
        if: steps.decide.outputs.should_trigger == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.payload.pull_request.head.sha,
              state: 'pending',
              context: 'codex-review',
              description: 'Waiting for Codex review...',
            });

      # Step 3: Post @codex review comment using CODEX_TRIGGER_PAT.
      # Embeds the reviewed SHA so the gate can bind the clean-pass to the exact commit.
      - name: Trigger Codex review
        if: steps.decide.outputs.should_trigger == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.CODEX_TRIGGER_PAT }}
          script: |
            const prNumber = context.payload.pull_request.number;
            const baseBranch = context.payload.pull_request.base.ref;
            const sha = context.payload.pull_request.head.sha;

            let reviewInstruction;
            if (baseBranch === 'main') {
              reviewInstruction = '@codex review';
            } else {
              reviewInstruction = '@codex review\n\nOnly report **P0** (critical: security vulnerabilities, data loss, crashes, broken deployments) and **P1** (significant: bugs, incorrect logic, missing error handling, breaking API changes). Skip P2 and below (style, minor improvements, suggestions).';
            }

            // Embed the reviewed SHA as a hidden HTML comment so the gate can
            // resolve exactly the SHA that was under review, not the current head.
            const body = `${reviewInstruction}\n<!-- reviewed-sha: ${sha} -->`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body,
            });
            console.log(`Triggered Codex review on PR #${prNumber} (target: ${baseBranch}, sha: ${sha})`);
