name: Codex Auto Review

# Simple workflow: pre-checks + trigger @codex review comment.
# Vera auto-assignment handled via .github/CODEOWNERS (native GitHub feature).

on:
  pull_request:
    types: [opened, ready_for_review, reopened, synchronize]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  codex-review:
    runs-on: ubuntu-latest
    steps:
      - name: Pre-check and trigger
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.CODEX_TRIGGER_PAT }}
          script: |
            // Skip draft PRs
            if (context.payload.pull_request?.draft) {
              console.log('Draft PR — skipping.');
              return;
            }

            // Skip bot actors
            if (context.actor === 'github-actions[bot]' || context.actor === 'codex-bot' || context.actor === 'chatgpt-codex-connector[bot]') {
              console.log(`Actor '${context.actor}' — skipping.`);
              return;
            }

            const token = '${{ secrets.CODEX_TRIGGER_PAT }}';
            if (!token) {
              console.log('CODEX_TRIGGER_PAT not configured — skipping.');
              return;
            }

            const prNumber = context.payload.pull_request.number;
            const baseBranch = context.payload.pull_request.base.ref;
            const sha = context.payload.pull_request.head.sha;

            // Skip non-dev/main branches
            if (baseBranch !== 'dev' && baseBranch !== 'main') {
              console.log(`Target branch '${baseBranch}' — skipping.`);
              return;
            }

            // Docs-only PRs check
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
              per_page: 100,
            });
            const docsOnly = files.every(f =>
              f.filename.startsWith('docs/') ||
              f.filename.endsWith('.md') ||
              f.filename.startsWith('README')
            );
            if (docsOnly) {
              console.log('Docs-only PR — skipping.');
              return;
            }

            // Deduplicate: skip if same SHA already reviewed
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              per_page: 50,
            });
            const lastTrigger = [...comments]
              .sort((a, b) => new Date(b.created_at) - new Date(a.created_at))
              .find(c => c.body.startsWith('@codex review'));
            const lastSha = lastTrigger?.body.match(/<!-- reviewed-sha: ([a-f0-9]{40}) -->/)?.[1];
            if (lastSha === sha) {
              console.log(`SHA ${sha} already reviewed — dedup skip.`);
              return;
            }

            // Build review instruction
            let instruction = '@codex review';
            if (baseBranch === 'dev') {
              instruction += '\n\nOnly report **P0** (critical: security, data loss, crashes) and **P1** (significant: bugs, incorrect logic). Skip P2 and below.';
            }

            // Post trigger comment
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: `${instruction}\n<!-- reviewed-sha: ${sha} -->`,
            });
            console.log(`Triggered Codex review on PR #${prNumber} (target: ${baseBranch})`);
