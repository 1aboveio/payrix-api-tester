steps:
  # Initialize environment-specific variables
  - name: 'bash'
    id: 'setup-env'
    env:
      - '_ENV=${_ENV}'
      - '_VPC_NETWORK_DEV=${_VPC_NETWORK_DEV}'
      - '_VPC_NETWORK_PROD=${_VPC_NETWORK_PROD}'
      - '_VPC_SUBNET_DEV=${_VPC_SUBNET_DEV}'
      - '_VPC_SUBNET_PROD=${_VPC_SUBNET_PROD}'
    args:
      - '-c'
      - |
        ENV_UPPER=$$(echo "$$_ENV" | tr '[:lower:]' '[:upper:]')
        NETWORK_VAR="_VPC_NETWORK_$$ENV_UPPER"
        SUBNET_VAR="_VPC_SUBNET_$$ENV_UPPER"
        VPC_NETWORK="$${!NETWORK_VAR}"
        VPC_SUBNET="$${!SUBNET_VAR}"
        echo "VPC_NETWORK=$$VPC_NETWORK" > /workspace/env.sh
        echo "VPC_SUBNET=$$VPC_SUBNET" >> /workspace/env.sh
        echo "Initialized: VPC network=$$VPC_NETWORK, subnet=$$VPC_SUBNET"

  # Build and push app container image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-app-image'
    args:
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/${_SERVICE}:$COMMIT_SHA'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/${_SERVICE}:latest'
      - '.'

  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-app-image-sha'
    args:
      - 'push'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/${_SERVICE}:$COMMIT_SHA'

  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-app-image-latest'
    args:
      - 'push'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/${_SERVICE}:latest'

  # Decide whether migrations need to run by hashing Prisma inputs and
  # comparing against a per-env marker in the Cloud Build GCS bucket.
  # When the hash matches, the migrate image build, push, and job
  # execution below all short-circuit.
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
    id: 'check-migration-needed'
    entrypoint: 'bash'
    args:
      - '-ceu'
      - |
        digest_file="/workspace/migration-digest.txt"
        current_digest="$$( \
          { \
            printf '%s\0' prisma/schema.prisma; \
            find prisma/migrations -type f -print0; \
          } | sort -z | xargs -0 sha256sum | sha256sum | cut -d' ' -f1 \
        )"
        printf '%s' "$${current_digest}" > "$${digest_file}"

        marker="gs://${PROJECT_ID}_cloudbuild/migrate-markers/${_SERVICE}-${_ENV}.digest"
        previous_digest="$$(gcloud storage cat "$${marker}" 2>/dev/null || true)"

        if [[ -n "$${previous_digest}" && "$${previous_digest}" == "$${current_digest}" ]]; then
          echo "Prisma inputs unchanged (digest $${current_digest}); skipping migrate image build and job."
        else
          if [[ -z "$${previous_digest}" ]]; then
            echo "No prior marker at $${marker}; migrations will run once to seed the marker."
          else
            echo "Prisma inputs changed (was $${previous_digest}, now $${current_digest}); migrations will run."
          fi
          touch /workspace/.migrate-needed
        fi

  # Build and push builder-stage image (contains prisma CLI + migrations).
  # Skipped when prior step did not set the sentinel.
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-migrate-image'
    entrypoint: 'bash'
    args:
      - '-ceu'
      - |
        if [[ ! -f /workspace/.migrate-needed ]]; then
          echo "Skipping build-migrate-image (schema unchanged)."
          exit 0
        fi
        docker build \
          --target=builder \
          -t "us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/${_SERVICE}-migrate:$COMMIT_SHA" \
          .

  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-migrate-image'
    entrypoint: 'bash'
    args:
      - '-ceu'
      - |
        if [[ ! -f /workspace/.migrate-needed ]]; then
          echo "Skipping push-migrate-image (schema unchanged)."
          exit 0
        fi
        docker push "us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/${_SERVICE}-migrate:$COMMIT_SHA"

  # Run database migrations via Cloud Run Job (uses builder-stage image with prisma CLI + VPC access).
  # On success, writes the new digest back to the marker so subsequent builds skip.
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'run-migrations'
    entrypoint: 'bash'
    timeout: '600s'
    args:
      - '-c'
      - |
        set -euo pipefail
        if [[ ! -f /workspace/.migrate-needed ]]; then
          echo "Skipping run-migrations (schema unchanged)."
          exit 0
        fi
        source /workspace/env.sh
        MIGRATE_JOB="${_SERVICE}-migrate-${_ENV}"
        MIGRATE_IMAGE="us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/${_SERVICE}-migrate:$COMMIT_SHA"

        echo "Deploying migration job: $${MIGRATE_JOB}..."
        gcloud run jobs deploy "$${MIGRATE_JOB}" \
          --image="$${MIGRATE_IMAGE}" \
          --region=us-central1 \
          --command="pnpm" \
          --args="exec,prisma,migrate,deploy" \
          --set-secrets="DATABASE_URL=database-url-payrix-tester:latest" \
          --network="$${VPC_NETWORK}" \
          --subnet="$${VPC_SUBNET}" \
          --memory=1Gi \
          --max-retries=1 \
          --task-timeout=300s

        echo "Executing migration job..."
        gcloud run jobs execute "$${MIGRATE_JOB}" \
          --region=us-central1 \
          --wait
        echo "Migrations completed successfully."

        marker="gs://${PROJECT_ID}_cloudbuild/migrate-markers/${_SERVICE}-${_ENV}.digest"
        gcloud storage cp /workspace/migration-digest.txt "$${marker}"
        echo "Wrote marker $${marker}."

        rm -rf /workspace/prisma /workspace/jobs /workspace/migrate.sh
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-service'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -euo pipefail
        source /workspace/env.sh
        SERVICE_NAME="${_SERVICE}-${_ENV}"
        IMAGE="us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/${_SERVICE}:$COMMIT_SHA"

        if [ "${_ENV}" = "prod" ]; then
          echo "Deploying $${SERVICE_NAME} to production (direct traffic)..."
        else
          echo "Deploying $${SERVICE_NAME} to development (direct traffic)..."
        fi

        gcloud run deploy "$${SERVICE_NAME}" \
          --image="$${IMAGE}" \
          --region=us-central1 \
          --platform=managed \
          --allow-unauthenticated \
          --memory=512Mi \
          --cpu=1 \
          --min-instances=0 \
          --max-instances=3 \
          --set-secrets="DATABASE_URL=database-url-payrix-tester:latest" \
          --clear-vpc-connector \
          --network="$${VPC_NETWORK}" \
          --subnet="$${VPC_SUBNET}"

        echo "Promoting latest revision to 100% traffic for $${SERVICE_NAME}..."
        gcloud run services update-traffic "$${SERVICE_NAME}" \
          --region=us-central1 \
          --to-latest

        SERVICE_URL=$(gcloud run services describe "$${SERVICE_NAME}" \
          --region=us-central1 \
          --format='value(status.url)')
        echo "Deployed service URL: $${SERVICE_URL}"

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'trigger-e2e'
    entrypoint: 'bash'
    secretEnv:
      - 'GH_PAT'
    args:
      - '-c'
      - |
        set -euo pipefail
        SERVICE_NAME="${_SERVICE}-${_ENV}"
        SERVICE_URL=$(gcloud run services describe "$${SERVICE_NAME}" \
          --region=us-central1 \
          --format='value(status.url)')
        echo "Triggering post-deploy E2E for $${SERVICE_NAME} ($${SERVICE_URL})"
        PAYLOAD=$(printf '{"event_type":"deploy-success","client_payload":{"env":"%s","service_url":"%s","commit":"%s"}}' \
          "${_ENV}" "$${SERVICE_URL}" "$COMMIT_SHA")
        RESP_FILE=$(mktemp)
        HTTP_CODE=$(curl --http1.1 -sS -o "$${RESP_FILE}" -w "%{http_code}" -X POST \
          -H "Accept: application/vnd.github+json" \
          -H "Content-Type: application/json" \
          -H "Authorization: token $${GH_PAT}" \
          https://api.github.com/repos/1aboveio/payrix-api-tester/dispatches \
          -d "$${PAYLOAD}")
        if [ "$${HTTP_CODE}" -lt 200 ] || [ "$${HTTP_CODE}" -ge 300 ]; then
          echo "WARNING: Dispatch returned HTTP $${HTTP_CODE} for ${_ENV} — E2E not triggered"
          cat "$${RESP_FILE}"
        fi


images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/${_SERVICE}:$COMMIT_SHA'
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/${_SERVICE}:latest'

substitutions:
  _SERVICE: payrix-api-tester
  _COMMIT_SHA: $COMMIT_SHA
  _ENV: prod
  _VPC_NETWORK_DEV: 'default'
  _VPC_SUBNET_DEV: 'default'
  _VPC_NETWORK_PROD: 'default'
  _VPC_SUBNET_PROD: 'default'
  _COMMIT_SHA: $COMMIT_SHA

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/github-pat-e2e-dispatch/versions/latest
      env: 'GH_PAT'

options:
  logging: CLOUD_LOGGING_ONLY

timeout: '1800s'
