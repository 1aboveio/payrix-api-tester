steps:
  # Initialize environment-specific variables
  - name: 'bash'
    id: 'setup-env'
    env:
      - '_ENV=${_ENV}'
      - '_VPC_NETWORK_DEV=${_VPC_NETWORK_DEV}'
      - '_VPC_NETWORK_PROD=${_VPC_NETWORK_PROD}'
      - '_VPC_SUBNET_DEV=${_VPC_SUBNET_DEV}'
      - '_VPC_SUBNET_PROD=${_VPC_SUBNET_PROD}'
    args:
      - '-c'
      - |
        ENV_UPPER=$$(echo "$$_ENV" | tr '[:lower:]' '[:upper:]')
        NETWORK_VAR="_VPC_NETWORK_$$ENV_UPPER"
        SUBNET_VAR="_VPC_SUBNET_$$ENV_UPPER"
        VPC_NETWORK="$${!NETWORK_VAR}"
        VPC_SUBNET="$${!SUBNET_VAR}"
        echo "VPC_NETWORK=$$VPC_NETWORK" > /workspace/env.sh
        echo "VPC_SUBNET=$$VPC_SUBNET" >> /workspace/env.sh
        echo "Initialized: VPC network=$$VPC_NETWORK, subnet=$$VPC_SUBNET"

  # Build and push app container image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-app-image'
    args:
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/${_SERVICE}:$COMMIT_SHA'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/${_SERVICE}:latest'
      - '.'

  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-app-image-sha'
    args:
      - 'push'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/${_SERVICE}:$COMMIT_SHA'

  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-app-image-latest'
    args:
      - 'push'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/${_SERVICE}:latest'

  # Run database migrations via Cloud Run Job (VPC access to reach Cloud SQL)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'run-migrations'
    entrypoint: 'bash'
    timeout: '600s'
    secretEnv:
      - 'GH_PAT'
    env:
      - 'GH_TOKEN=$${GH_PAT}'
    args:
      - '-c'
      - |
        set -euo pipefail
        source /workspace/env.sh
        PROJECT_ID="$${PROJECT_ID:-$(gcloud config get-value project --quiet)}"
        IMAGE="us-central1-docker.pkg.dev/$${PROJECT_ID}/cloud-run-source-deploy/${_SERVICE}:$COMMIT_SHA"
        MIGRATE_JOB="${_SERVICE}-migrate-${_ENV}"

        echo "Fetching database URL from Secret Manager..."
        DATABASE_URL=$$(gcloud secrets versions access latest \
          --secret=database-url-payrix-tester --format='value()')

        echo "Fetching prisma schema + migrations from GitHub at commit $COMMIT_SHA..."
        mkdir -p /workspace/prisma /workspace/jobs
        curl -fsSL -H "Authorization: token $$GH_TOKEN" \
          "https://api.github.com/repos/1aboveio/payrix-api-tester/tarball/$COMMIT_SHA" | \
          tar xzf - --wildcards '*/prisma/schema.prisma' '*/prisma/migrations/*' \
          --strip-components=1 -C /workspace/prisma
        chmod -R u+rw /workspace/prisma

        # Create migrate startup script
        cat > /workspace/migrate.sh << 'SCRIPT'
        #!/bin/sh
        npm install -g prisma
        prisma migrate deploy --schema /workspace/prisma/schema.prisma
        SCRIPT
        chmod +x /workspace/migrate.sh

        # Build the job manifest from the template (substituting placeholders)
        # Use @ as delimiter to avoid conflicts with DATABASE_URL slashes
        sed \
          -e "s@PAYRIX_MIGRATE_JOB@$${MIGRATE_JOB}@g" \
          -e "s@PAYRIX_SERVICE@${_SERVICE}@g" \
          -e "s@PAYRIX_IMAGE@$${IMAGE}@g" \
          -e "s@PAYRIX_DATABASE_URL@$${DATABASE_URL}@g" \
          /workspace/cloudrun-job-migrate.yaml > /workspace/jobs/migrate.yaml

        echo "Creating/updating Cloud Run Job..."
        gcloud alpha run jobs replace /workspace/jobs/migrate.yaml --region=us-central1 || \
        gcloud alpha run jobs create "$${MIGRATE_JOB}" \
          --image="$${IMAGE}" --region=us-central1 \
          --command="/bin/sh" --args="/workspace/migrate.sh" \
          --set-env-vars="DATABASE_URL=$${DATABASE_URL}" \
          --network="$${VPC_NETWORK}" --subnet="$${VPC_SUBNET}" \
          --memory=512Mi --cpu=1 --max-retries=0 --quiet

        echo "Executing Cloud Run Job..."
        RUN_NAME=$$(gcloud alpha run jobs execute "$${MIGRATE_JOB}" \
          --region=us-central1 --format='value(metadata.name)')
        gcloud alpha run jobs executions wait "$${RUN_NAME}" --region=us-central1
        EXIT_CODE=$$(gcloud alpha run jobs executions describe "$${RUN_NAME}" \
          --region=us-central1 --format='value(appStatus.exitCode)')
        if [ -n "$$EXIT_CODE" ] && [ "$$EXIT_CODE" != "0" ]; then
          echo "ERROR: Migration failed with exit code $$EXIT_CODE"
          exit 1
        fi
        echo "Migration completed successfully"
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-service'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -euo pipefail
        source /workspace/env.sh
        SERVICE_NAME="${_SERVICE}-${_ENV}"
        IMAGE="us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/${_SERVICE}:$COMMIT_SHA"

        if [ "${_ENV}" = "prod" ]; then
          echo "Deploying $${SERVICE_NAME} to production (direct traffic)..."
        else
          echo "Deploying $${SERVICE_NAME} to development (direct traffic)..."
        fi

        gcloud run deploy "$${SERVICE_NAME}" \
          --image="$${IMAGE}" \
          --region=us-central1 \
          --platform=managed \
          --allow-unauthenticated \
          --memory=512Mi \
          --cpu=1 \
          --min-instances=0 \
          --max-instances=3 \
          --set-secrets="DATABASE_URL=database-url-payrix-tester:latest" \
          --clear-vpc-connector \
          --network="$${VPC_NETWORK}" \
          --subnet="$${VPC_SUBNET}"

        echo "Promoting latest revision to 100% traffic for $${SERVICE_NAME}..."
        gcloud run services update-traffic "$${SERVICE_NAME}" \
          --region=us-central1 \
          --to-latest

        SERVICE_URL=$(gcloud run services describe "$${SERVICE_NAME}" \
          --region=us-central1 \
          --format='value(status.url)')
        echo "Deployed service URL: $${SERVICE_URL}"

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'trigger-e2e'
    entrypoint: 'bash'
    secretEnv:
      - 'GH_PAT'
    args:
      - '-c'
      - |
        set -euo pipefail
        SERVICE_NAME="${_SERVICE}-${_ENV}"
        SERVICE_URL=$(gcloud run services describe "$${SERVICE_NAME}" \
          --region=us-central1 \
          --format='value(status.url)')
        echo "Triggering post-deploy E2E for $${SERVICE_NAME} ($${SERVICE_URL})"
        PAYLOAD=$(printf '{"event_type":"deploy-success","client_payload":{"env":"%s","service_url":"%s","commit":"%s"}}' \
          "${_ENV}" "$${SERVICE_URL}" "$COMMIT_SHA")
        RESP_FILE=$(mktemp)
        HTTP_CODE=$(curl --http1.1 -sS -o "$${RESP_FILE}" -w "%{http_code}" -X POST \
          -H "Accept: application/vnd.github+json" \
          -H "Content-Type: application/json" \
          -H "Authorization: token $${GH_PAT}" \
          https://api.github.com/repos/1aboveio/payrix-api-tester/dispatches \
          -d "$${PAYLOAD}")
        if [ "$${HTTP_CODE}" -lt 200 ] || [ "$${HTTP_CODE}" -ge 300 ]; then
          echo "WARNING: Dispatch returned HTTP $${HTTP_CODE} for ${_ENV} — E2E not triggered"
          cat "$${RESP_FILE}"
        fi


images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/${_SERVICE}:$COMMIT_SHA'
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/${_SERVICE}:latest'

substitutions:
  _SERVICE: payrix-api-tester
  _ENV: prod
  _VPC_NETWORK_DEV: 'default'
  _VPC_SUBNET_DEV: 'default'
  _VPC_NETWORK_PROD: 'default'
  _VPC_SUBNET_PROD: 'default'

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/github-pat-e2e-dispatch/versions/latest
      env: 'GH_PAT'

options:
  logging: CLOUD_LOGGING_ONLY

timeout: '1800s'
