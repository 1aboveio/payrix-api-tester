steps:
  - id: 'cancel-previous-builds'
    name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: bash
    args:
      - '-c'
      - |
        echo "Checking for in-progress builds on trigger: $TRIGGER_ID"
        for id in $$(gcloud builds list \
          --filter="trigger_id=$TRIGGER_ID AND status=WORKING AND id!=$BUILD_ID" \
          --format="value(id)" \
          --project=$PROJECT_ID); do
          echo "Cancelling previous build: $$id"
          gcloud builds cancel "$$id" --project=$PROJECT_ID || true
        done
        echo "Done."

  - id: 'migrate-db'
    name: 'node:20'
    entrypoint: 'bash'
    secretEnv:
      - 'DATABASE_URL'
    args:
      - '-c'
      - |
        set -euo pipefail
        npm install -g pnpm
        pnpm install --frozen-lockfile
        npx prisma migrate deploy

  - name: 'node:20'
    id: 'run-db-migrations'
    entrypoint: 'bash'
    secretEnv:
      - 'DATABASE_URL'
    args:
      - '-c'
      - |
        npm install -g pnpm
        pnpm install --frozen-lockfile
        npx prisma migrate deploy

  # Build and push app container image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-app-image'
    args:
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/${_SERVICE}:$COMMIT_SHA'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/${_SERVICE}:latest'
      - '.'

  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-app-image-sha'
    args:
      - 'push'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/${_SERVICE}:$COMMIT_SHA'

  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-app-image-latest'
    args:
      - 'push'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/${_SERVICE}:latest'

  # Deploy to service (no canary mode)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-service'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -euo pipefail
        SERVICE_NAME="${_SERVICE}-${_ENV}"
        IMAGE="us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/${_SERVICE}:$COMMIT_SHA"

        if [ "${_ENV}" = "prod" ]; then
          echo "Deploying $${SERVICE_NAME} to production (direct traffic)..."
        else
          echo "Deploying $${SERVICE_NAME} to development (direct traffic)..."
        fi

        gcloud run deploy "$${SERVICE_NAME}" \
          --image="$${IMAGE}" \
          --region=us-central1 \
          --platform=managed \
          --allow-unauthenticated \
          --memory=512Mi \
          --cpu=1 \
          --min-instances=0 \
          --max-instances=3 \
          --set-secrets="DATABASE_URL=database-url-payrix-tester:latest" \
          --add-cloudsql-instances=cosmic-heaven-479306-v5:us-central1:a1-test \
          --network=default \
          --subnet=default \
          --vpc-egress=all-traffic

        echo "Promoting latest revision to 100% traffic for $${SERVICE_NAME}..."
        gcloud run services update-traffic "$${SERVICE_NAME}" \
          --region=us-central1 \
          --to-latest

        SERVICE_URL=$(gcloud run services describe "$${SERVICE_NAME}" \
          --region=us-central1 \
          --format='value(status.url)')
        echo "Deployed service URL: $${SERVICE_URL}"

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'trigger-e2e'
    entrypoint: 'bash'
    secretEnv:
      - 'GH_PAT'
    args:
      - '-c'
      - |
        set -euo pipefail
        SERVICE_NAME="${_SERVICE}-${_ENV}"
        SERVICE_URL=$(gcloud run services describe "$${SERVICE_NAME}" \
          --region=us-central1 \
          --format='value(status.url)')
        echo "Triggering post-deploy E2E for $${SERVICE_NAME} ($${SERVICE_URL})"
        PAYLOAD=$(printf '{"event_type":"deploy-success","client_payload":{"env":"%s","service_url":"%s","commit":"%s"}}' \
          "${_ENV}" "$${SERVICE_URL}" "$COMMIT_SHA")
        RESP_FILE=$(mktemp)
        HTTP_CODE=$(curl --http1.1 -sS -o "$${RESP_FILE}" -w "%{http_code}" -X POST \
          -H "Accept: application/vnd.github+json" \
          -H "Content-Type: application/json" \
          -H "Authorization: token $${GH_PAT}" \
          https://api.github.com/repos/1aboveio/payrix-api-tester/dispatches \
          -d "$${PAYLOAD}")
        if [ "$${HTTP_CODE}" -lt 200 ] || [ "$${HTTP_CODE}" -ge 300 ]; then
          echo "WARNING: Dispatch returned HTTP $${HTTP_CODE} for ${_ENV} — E2E not triggered"
          cat "$${RESP_FILE}"
        fi


images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/${_SERVICE}:$COMMIT_SHA'
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/${_SERVICE}:latest'

substitutions:
  _SERVICE: payrix-api-tester
  _ENV: prod

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/github-pat-e2e-dispatch/versions/latest
      env: 'GH_PAT'
    - versionName: projects/$PROJECT_ID/secrets/database-url-payrix-tester/versions/latest
      env: 'DATABASE_URL'

options:
  logging: CLOUD_LOGGING_ONLY

timeout: '1800s'
