steps:
  # Build and push app container image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-app-image'
    args:
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/${_SERVICE}:$COMMIT_SHA'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/${_SERVICE}:latest'
      - '.'

  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-app-image-sha'
    args:
      - 'push'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/${_SERVICE}:$COMMIT_SHA'

  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-app-image-latest'
    args:
      - 'push'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/${_SERVICE}:latest'

  # Deploy: dev uses direct traffic deployment; prod keeps current behavior
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-service'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -euo pipefail
        SERVICE_NAME="${_SERVICE}-${_ENV}"
        IMAGE="us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/${_SERVICE}:$COMMIT_SHA"

        if [ "${_ENV}" = "dev" ]; then
          echo "Deploying $${SERVICE_NAME} with direct traffic..."
          REVISION=$(gcloud run deploy "$${SERVICE_NAME}" \
            --image="$${IMAGE}" \
            --region=us-central1 \
            --platform=managed \
            --allow-unauthenticated \
            --memory=512Mi \
            --cpu=1 \
            --min-instances=0 \
            --max-instances=3 \
            --format='value(status.latestCreatedRevisionName)')

          SERVICE_URL=$(gcloud run services describe "$${SERVICE_NAME}" \
            --region=us-central1 \
            --format='value(status.url)')
          echo "$${REVISION}" > /workspace/canary_revision.txt
          echo "$${SERVICE_URL}" > /workspace/canary_url.txt
          echo "Deployed revision: $${REVISION}"
          echo "Service URL: $${SERVICE_URL}"
        else
          echo "Deploying $${SERVICE_NAME} with normal traffic flow..."
          gcloud run deploy "$${SERVICE_NAME}" \
            --image="$${IMAGE}" \
            --region=us-central1 \
            --platform=managed \
            --allow-unauthenticated \
            --memory=512Mi \
            --cpu=1 \
            --min-instances=0 \
            --max-instances=3
        fi

  # Dev-only: run E2E after deploy (non-blocking)
  - name: 'gcr.io/cloud-builders/docker'
    id: 'run-e2e-canary'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -euo pipefail

        if [ "${_ENV}" != "dev" ]; then
          echo "Skipping E2E step for non-dev environment (${_ENV})."
          exit 0
        fi

        E2E_URL=$(cat /workspace/canary_url.txt)
        echo "Running E2E against deployed URL: $${E2E_URL}"

        docker run --rm \
          -v /workspace:/workspace \
          -w /workspace \
          -e E2E_BASE_URL="$${E2E_URL}" \
          mcr.microsoft.com/playwright:v1.58.2-noble \
          bash -lc "npm ci && npx playwright test --workers=4 --retries=0" || true

images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/${_SERVICE}:$COMMIT_SHA'
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/${_SERVICE}:latest'

substitutions:
  _SERVICE: payrix-api-tester
  _ENV: prod

options:
  logging: CLOUD_LOGGING_ONLY

timeout: '1800s'
